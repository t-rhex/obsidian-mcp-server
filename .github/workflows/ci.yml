name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify server starts
        run: |
          mkdir -p /tmp/test-vault
          timeout 5 node build/index.js 2>&1 || true
        env:
          OBSIDIAN_VAULT_PATH: /tmp/test-vault

      - name: Verify npx bin works
        run: |
          chmod +x build/index.js
          node build/index.js --help 2>&1 || true
